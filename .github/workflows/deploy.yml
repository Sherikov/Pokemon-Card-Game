name: Deploy to GitHub Pages

on:
  # Запуск при пуше в ветку main
  push:
    branches: ["main"]
  # Позволяет запускать Action вручную из интерфейса GitHub
  workflow_dispatch:

# Настройка прав доступа для токена GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Отмена предыдущих незавершенных сборок, если запущены новые
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite по умолчанию собирает билд в папку dist
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4